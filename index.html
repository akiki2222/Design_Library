          似顔絵を手渡したときに見せてくれた笑顔が忘れられず、“人を笑顔にするデザイン”を目指すようになりました。<br />一人旅が好きな行動力お化け。しかし40を過ぎてからおうち時間の良さに気付く。（億劫になっている可能性大。）<br />エヴァンゲリオンの呪縛から解放されないアラフォー。
        </p>
