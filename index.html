<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1 class="logo">
        <img src="./img/title-rogo.svg" alt="ロゴ" />
      </h1>
      <nav class="pc_nav">
        <ul>
          <li><a href="#">Works</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <!-- workここから -->
      <section class="Works">
        <h2 class="section_title">Works</h2>
        <div class="filter">
          <span>All</span>
          <span>Illustration</span>
          <span>Dtp</span>
          <span>Web</span>
        </div>
        <div class="gallery">
          <div class="pictures">
            <img src="img/web_hamburger.jpg" alt="Web" />
            <img src="img/illustration_dog.jpg" alt="イラスト" />
            <img src="img/web_school.jpg" alt="Web" />
            <img src="img/illustration_naomi.JPG" alt="イラスト" />
            <img src="img/illustration_fujii.jpg" alt="イラスト" />
            <img src="img/web_icecream.jpg" alt="Web" />
            <img src="img/web_mobileplan.jpg" alt="Web" />
            <img src="img/illustration_wedding2.jpg" alt="イラスト" />
            <img src="img/illustration_kiyo.jpg" alt="イラスト" />
            <img src="img/dtp_event-flyer1.jpg" alt="Dtp" />
            <img src="img/illustration_nigaoe2.jpg" alt="イラスト" />
            <img src="img/web_english-school.jpg" alt="Web" />
            <img src="img/dtp_dentalclinic.jpg" alt="Dtp" />
            <img src="img/illustration_namie.JPG" alt="イラスト" />
            <img src="img/web_cleansing.jpg" alt="Web" />
            <img src="img/illustration_muscle.jpg" alt="Dtp" />
          </div>
        </div>
      </section>
      <!-- Workここまで -->
      <!-- aboutここから -->
      <section>
        <h2 class="section_title">About</h2>
        <div class="my information">
          <div class="myface">
            <img src="img/my face.svg" width="200" alt="自己紹介" />
          </div>
          <p class="name">塩原 亜季子</p>
          <p class="location">岩手県在住</p>
          <p class="introduce">
            似顔絵を手渡したときに見せてくれた笑顔が忘れられず、“人を笑顔にするデザイン”を目指すようになりました。<br />一人旅が好きな行動力お化け。しかし40を過ぎてからおうち時間の良さに気付く。（億劫になっている可能性大。）<br />エヴァンゲリオンの呪縛から解放されないアラフォー。
          </p>
          <div class="history">
            <h3 class="history">経歴</h3>
            <p>2005年 代々木アニメーション学院 卒業</p>
            <p>2021年 にがおえがお 開業</p>
          </div>
        </div>
      </section>
      <!-- aboutここまで -->
      <!-- contactここから -->

      <section class="contact">
        <h2>Contact</h2>
        <form
          action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSdJh4Z8PhwSpYIARpGRE6akuXfmp89MDh7Jr-N2z7iqNKhPUg/formResponse"
          method="POST"
        >
          <label for="name">お名前</label>
          <input id="name" type="text" name="entry.1975025749" required />

          <label for="email">メールアドレス</label>
          <input id="email" type="email" name="entry.1072622136" required />

          <label for="message">お問い合わせ内容</label>
          <textarea id="message" name="entry.1425299279" required></textarea>

          <button type="submit">送信する</button>
        </form>
      </section>
    </main>
    <footer>
      <div class="footer_logo">
        <img src="img/title-rogo.svg" alt="フッターロゴ" />
      </div>
      <div class="sns_logo">
        <img src="img/Xrogo.svg" alt="X ロゴ" />
        <img src="img/instagram-rogo.svg" alt="insta ロゴ" />
      </div>
      <p>© Design Library</p>
    </footer>
  </body>
</html>
